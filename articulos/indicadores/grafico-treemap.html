<h2>¿Cuándo se usa?</h2>
<p>El gráfico Treemap es ideal para visualizar <strong>datos jerárquicos y grandes conjuntos de información</strong>. Muestra la estructura jerárquica de manera clara, revela patrones y tendencias, y es interactivo y personalizable.</p>
